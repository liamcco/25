services:
  postgres:
    image: postgres:16-alpine
    container_name: twenty-five-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: twenty_five_dev
      POSTGRES_USER: twenty_five
      POSTGRES_PASSWORD: twenty_five_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twenty_five -d twenty_five_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
